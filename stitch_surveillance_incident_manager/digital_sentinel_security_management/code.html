<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Ingreso al Sistema - Digital Sentinel</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#39b8fd",
                        "primary-fixed-dim": "#bcc7de",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dfe3e7",
                        "on-primary-fixed-variant": "#3c475a",
                        "surface-container-high": "#e4e9ed",
                        "surface": "#f6fafe",
                        "on-background": "#171c1f",
                        "surface-bright": "#f6fafe",
                        "surface-tint": "#545f73",
                        "on-primary-fixed": "#111c2d",
                        "on-surface-variant": "#45474c",
                        "on-secondary-fixed-variant": "#004c6e",
                        "on-error": "#ffffff",
                        "outline-variant": "#c5c6cd",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-container": "#35260c",
                        "on-secondary-container": "#004666",
                        "tertiary-fixed": "#fadfb8",
                        "inverse-primary": "#bcc7de",
                        "on-secondary-fixed": "#001e2f",
                        "surface-container-low": "#f0f4f8",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#edf1f5",
                        "primary": "#091426",
                        "tertiary": "#1e1200",
                        "on-surface": "#171c1f",
                        "surface-container-lowest": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#271902",
                        "primary-container": "#1e293b",
                        "secondary-fixed-dim": "#89ceff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d8e3fb",
                        "outline": "#75777d",
                        "inverse-surface": "#2c3134",
                        "on-tertiary-container": "#a38c6a",
                        "secondary-fixed": "#c9e6ff",
                        "on-primary-container": "#8590a6",
                        "background": "#f6fafe",
                        "surface-container": "#eaeef2",
                        "tertiary-fixed-dim": "#ddc39d",
                        "surface-dim": "#d6dade",
                        "secondary": "#006591",
                        "surface-container-highest": "#dfe3e7",
                        "on-tertiary-fixed-variant": "#564427"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Public Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
        }
        .signature-gradient {
            background: linear-gradient(135deg, #091426 0%, #1e293b 100%);
        }
        input:focus {
            box-shadow: 0 0 0 2px rgba(14, 165, 233, 0.2);
            border: none !important;
        }
    </style>
</head>
<body class="bg-surface-container-low font-body text-on-surface flex items-center justify-center min-h-screen relative overflow-hidden">
<!-- Background Decoration (Tonal Layering) -->
<div class="absolute inset-0 z-0">
<div class="absolute top-[-10%] right-[-10%] w-[50%] h-[50%] rounded-full bg-secondary/5 blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
<!-- Login Container -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 signature-gradient flex items-center justify-center rounded-xl shadow-xl mb-6">
<span class="material-symbols-outlined text-surface text-3xl" style="font-variation-settings: 'FILL' 1;">security</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-primary uppercase">
                Digital Sentinel
            </h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant mt-2 font-semibold">
                Operational Command Unit
            </p>
</div>
<!-- Login Card -->
<div class="surface-container-lowest glass-panel rounded-xl p-8 shadow-[0px_20px_40px_rgba(9,20,38,0.06)]">
<h2 class="font-headline text-xl font-bold text-primary mb-8 text-center">
                Ingreso al Sistema
            </h2>
<form action="#" class="space-y-6" method="POST">
<!-- Username Field -->
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant flex items-center gap-2" for="username">
<span class="material-symbols-outlined text-sm">badge</span>
                        Usuario
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest/40 border-none rounded-lg px-4 py-3 text-sm font-medium placeholder:text-on-surface-variant/40 transition-all focus:ring-0" id="username" name="username" placeholder="Identificador de Agente" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label text-[11px] font-bold uppercase tracking-[0.05em] text-on-surface-variant flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-sm">lock</span>
                        Contraseña
                    </label>
<div class="relative">
<input class="w-full bg-surface-container-highest/40 border-none rounded-lg px-4 py-3 text-sm font-medium placeholder:text-on-surface-variant/40 transition-all focus:ring-0" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Action Bar -->
<div class="pt-4">
<button class="w-full signature-gradient text-on-primary font-label text-sm font-bold uppercase tracking-widest py-4 rounded-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                        Iniciar Sesión
                        <span class="material-symbols-outlined text-lg">login</span>
</button>
</div>
</form>
<!-- Metadata Footer -->
<div class="mt-10 flex flex-col items-center space-y-4">
<a class="font-label text-[11px] font-semibold text-secondary hover:text-secondary-container transition-colors uppercase tracking-wider" href="#">
                    Solicitar acceso de nivel 4
                </a>
<div class="flex items-center gap-4 text-[10px] font-medium text-on-surface-variant/40 uppercase tracking-tighter">
<span>Versión 2.4.0-ST</span>
<span class="w-1 h-1 rounded-full bg-outline-variant"></span>
<span>Acceso Encriptado TLS 1.3</span>
</div>
</div>
</div>
<!-- Support Info -->
<p class="text-center mt-8 font-label text-[11px] text-on-surface-variant/60 leading-relaxed max-w-[280px] mx-auto">
            Este sistema es propiedad de Digital Sentinel. El acceso no autorizado está estrictamente prohibido y sujeto a acciones legales.
        </p>
</main>
<!-- Decoration Element (Asymmetric Detail) -->
<div class="absolute bottom-12 right-12 hidden lg:block opacity-20">
<div class="flex flex-col items-end">
<div class="w-32 h-[1px] bg-primary mb-2"></div>
<div class="font-headline text-primary font-black text-6xl tracking-tighter leading-none">01</div>
<div class="font-label text-[10px] uppercase tracking-[0.5em] mt-1">Command_Center</div>
</div>
</div>
</body></html>
